<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador de Senhas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🔐 Criador de Senhas</h1>

    <input type="text" id="senha" readonly>

    <div class="config">
        <label>Tamanho:
            <input type="number" id="tamanho" value="16" min="4" max="64">
        </label>

        <label>
            <input type="checkbox" id="maiusculas" checked>
            Letras Maiúsculas
        </label>

        <label>
            <input type="checkbox" id="minusculas" checked>
            Letras Minúsculas
        </label>

        <label>
            <input type="checkbox" id="numeros" checked>
            Números
        </label>

        <label>
            <input type="checkbox" id="simbolos" checked>
            Símbolos
        </label>
    </div>

    <button onclick="gerarSenha()">Gerar Senha</button>
    <button onclick="copiarSenha()">Copiar</button>
</div>

<script src="script.js"></script>
</body>
</html>
